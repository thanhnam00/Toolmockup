name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 60s
          script: |
            cd /root/Toolmockup
            git pull origin main
            cp -f index.html /var/www/toolmockup/index.html 2>/dev/null || true
            cp -f flow_server.py /root/flow_server.py
            pkill -f flow_server.py || true
            sleep 2
            export DISPLAY=:99
            cd /root
            nohup /root/flow_env/bin/python3 /root/flow_server.py > /root/flow_server.log 2>&1 &
            echo "Deploy completed - server restarting"
