name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/Toolmockup
            git pull origin main
            cp -f index.html /var/www/toolmockup/index.html 2>/dev/null || true
            cp -f flow_server.py /root/flow_server.py

            # Create/update systemd service for flow_server
            cat > /etc/systemd/system/flow-server.service << 'SVCEOF'
            [Unit]
            Description=Google Flow Image Generator
            After=network.target

            [Service]
            Type=simple
            Environment=DISPLAY=:99
            WorkingDirectory=/root
            ExecStart=/root/flow_env/bin/python3 /root/flow_server.py
            Restart=on-failure
            RestartSec=5
            StandardOutput=append:/root/flow_server.log
            StandardError=append:/root/flow_server.log

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable flow-server
            systemctl restart flow-server
            systemctl is-active flow-server
            echo "Deploy completed"
