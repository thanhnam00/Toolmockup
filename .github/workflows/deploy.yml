name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/Toolmockup
            git pull origin main
            cp -f index.html /var/www/toolmockup/index.html 2>/dev/null || true
            cp -f flow_server.py /root/flow_server.py
            cp -f restart_server.sh /root/restart_server.sh
            chmod +x /root/restart_server.sh
            echo "Files deployed"

      - name: Restart server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            /root/restart_server.sh
