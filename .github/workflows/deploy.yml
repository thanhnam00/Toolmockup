name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/Toolmockup
            git pull origin main
            cp -f index.html /var/www/toolmockup/index.html 2>/dev/null || true
            cp -f flow_server.py /root/flow_server.py
            cp -f telegram_bot.py /root/telegram_bot.py
            echo '' | base64 -d > /root/gdrive_credentials.json
            /root/flow_env/bin/pip install python-telegram-bot httpx google-api-python-client google-auth 2>/dev/null || true
            printf '[Unit]\nDescription=Google Flow Image Generator\nAfter=network.target\n\n[Service]\nType=simple\nWorkingDirectory=/root\nExecStart=/usr/bin/xvfb-run -a /root/flow_env/bin/python3 /root/flow_server.py\nRestart=on-failure\nRestartSec=5\nStandardOutput=append:/root/flow_server.log\nStandardError=append:/root/flow_server.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/flow-server.service
            printf '[Unit]\nDescription=Telegram Bot for Flow\nAfter=flow-server.service\n\n[Service]\nType=simple\nWorkingDirectory=/root\nExecStart=/root/flow_env/bin/python3 /root/telegram_bot.py\nRestart=on-failure\nRestartSec=5\nStandardOutput=append:/root/telegram_bot.log\nStandardError=append:/root/telegram_bot.log\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/telegram-bot.service
            systemctl daemon-reload
            systemctl restart flow-server
            systemctl restart telegram-bot
            systemctl enable telegram-bot
            systemctl start nginx
            echo "Done"
